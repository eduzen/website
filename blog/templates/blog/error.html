{% load i18n %}

<div class="contact-page">
  <div class="contact-result reveal">
    <span class="contact-result__icon contact-result__icon--error" aria-hidden="true">!</span>
    {% if error %}
      <p class="text-lg text-error">{{ error }}</p>
      <a class="warm-link"
         href="{% url 'contact' %}"
         hx-get="{% url 'contact' %}"
         hx-target="#content"
         hx-push-url="true">
        ← {% translate "Try again" %}
      </a>
    {% else %}
      <h1 class="section-title">
        {% translate 'Ups... something went wrong.' %} 🙃
      </h1>
      <div class="contact-accent" aria-hidden="true"></div>
      <p class="contact-result__text">
        {% translate 'Please try again later... or contact me' %}
        <a class="warm-link"
           href="{% url 'contact' %}"
           hx-get="{% url 'contact' %}"
           hx-target="#content"
           hx-push-url="true">
          {% translate "here" %}
        </a>.
      </p>
    {% endif %}
  </div>
</div>
